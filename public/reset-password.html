<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — SeatSniper ASU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--maroon:#8C1D40;--gold:#FFC627;--bg:#080608;--surface:#1A1218;--border:rgba(140,29,64,0.3);--text:#F0E8EC;--muted:#8A7880;--green:#3DD68C;--red:#F76E6E;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    nav{position:fixed;top:0;left:0;right:0;background:rgba(8,6,8,0.95);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:1px;text-decoration:none}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;margin-top:80px}
    h1{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#fff;margin-bottom:6px}
    .sub{font-size:14px;color:var(--muted);margin-bottom:28px}
    .fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
    .fg label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
    .fg input{background:#221820;border:1px solid rgba(255,255,255,.07);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:11px 14px;outline:none;transition:border-color .15s;width:100%}
    .fg input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,198,39,.1)}
    .fg input::placeholder{color:rgba(138,120,128,.6)}
    .btn{width:100%;padding:13px;background:var(--gold);color:#5C0F28;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;cursor:pointer;transition:all .15s}
    .btn:hover{background:#FFD147}.btn:disabled{opacity:.6;cursor:not-allowed}
    .al{border-radius:8px;padding:10px 14px;font-size:13px;margin-top:12px;display:none}
    .al.s{background:rgba(61,214,140,.1);border:1px solid rgba(61,214,140,.3);color:var(--green);display:block}
    .al.e{background:rgba(247,110,110,.1);border:1px solid rgba(247,110,110,.3);color:var(--red);display:block}
    .back{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
    .back a{color:var(--gold);text-decoration:none}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/index.html">SEATSNIPER</a>
</nav>

<div class="card" id="forgotCard">
  <h1>Forgot Password</h1>
  <div class="sub">Enter your email and we'll send you a reset link.</div>
  <div class="fg">
    <label>Email</label>
    <input type="email" id="forgotEmail" placeholder="you@email.com" />
  </div>
  <button class="btn" id="forgotBtn" onclick="handleForgot()">SEND RESET LINK</button>
  <div class="al" id="forgotAlert"></div>
  <div class="back"><a href="/index.html">← Back to login</a></div>
</div>

<div class="card" id="resetCard" style="display:none">
  <h1>New Password</h1>
  <div class="sub">Enter your new password below.</div>
  <div class="fg">
    <label>New Password</label>
    <input type="password" id="newPassword" placeholder="Min 6 characters" />
  </div>
  <div class="fg">
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Repeat password" />
  </div>
  <button class="btn" id="resetBtn" onclick="handleReset()">RESET PASSWORD</button>
  <div class="al" id="resetAlert"></div>
  <div class="back"><a href="/index.html">← Back to login</a></div>
</div>

<script>
  const token = new URLSearchParams(window.location.search).get("token");

  // If token in URL, show reset form instead of forgot form
  if (token) {
    document.getElementById("forgotCard").style.display = "none";
    document.getElementById("resetCard").style.display = "block";
  }

  async function handleForgot() {
    const email = document.getElementById("forgotEmail").value.trim();
    const btn = document.getElementById("forgotBtn");
    const alert = document.getElementById("forgotAlert");
    alert.className = "al";
    if (!email) { alert.className = "al e"; alert.textContent = "Please enter your email."; return; }
    btn.disabled = true; btn.textContent = "SENDING...";
    try {
      const res = await fetch("/api/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      alert.className = "al s";
      alert.textContent = "✅ " + data.message;
    } catch(e) {
      alert.className = "al e";
      alert.textContent = "❌ Something went wrong. Please try again.";
    }
    btn.disabled = false; btn.textContent = "SEND RESET LINK";
  }

  async function handleReset() {
    const password = document.getElementById("newPassword").value;
    const confirm = document.getElementById("confirmPassword").value;
    const btn = document.getElementById("resetBtn");
    const alert = document.getElementById("resetAlert");
    alert.className = "al";
    if (!password || password.length < 6) { alert.className = "al e"; alert.textContent = "Password must be at least 6 characters."; return; }
    if (password !== confirm) { alert.className = "al e"; alert.textContent = "Passwords don't match."; return; }
    btn.disabled = true; btn.textContent = "RESETTING...";
    try {
      const res = await fetch("/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();
      if (res.ok) {
        alert.className = "al s";
        alert.textContent = "✅ " + data.message;
        setTimeout(() => window.location.href = "/index.html", 2000);
      } else {
        alert.className = "al e";
        alert.textContent = "❌ " + (data.error || "Reset failed");
      }
    } catch(e) {
      alert.className = "al e";
      alert.textContent = "❌ Something went wrong. Please try again.";
    }
    btn.disabled = false; btn.textContent = "RESET PASSWORD";
  }

  document.getElementById("forgotEmail")?.addEventListener("keydown", e => { if (e.key === "Enter") handleForgot(); });
  document.getElementById("newPassword")?.addEventListener("keydown", e => { if (e.key === "Enter") handleReset(); });
</script>
</body>
</html>
