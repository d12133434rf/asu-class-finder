<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email — SeatSniper ASU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--maroon:#8C1D40;--gold:#FFC627;--bg:#080608;--surface:#1A1218;--border:rgba(140,29,64,0.3);--text:#F0E8EC;--muted:#8A7880;--green:#3DD68C;--red:#F76E6E;}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
    nav{position:fixed;top:0;left:0;right:0;background:rgba(8,6,8,0.95);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:1px;text-decoration:none}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:440px;margin-top:80px}
    .icon{font-size:52px;margin-bottom:16px}
    h1{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#fff;margin-bottom:8px}
    p{color:var(--muted);font-size:15px;margin-bottom:24px;line-height:1.6}
    .btn{display:inline-block;padding:13px 32px;background:var(--gold);color:#5C0F28;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;cursor:pointer;text-decoration:none;transition:all .15s}
    .btn:hover{background:#FFD147}
    .al{border-radius:8px;padding:12px 16px;font-size:14px;margin-bottom:20px}
    .al.s{background:rgba(61,214,140,.1);border:1px solid rgba(61,214,140,.3);color:var(--green)}
    .al.e{background:rgba(247,110,110,.1);border:1px solid rgba(247,110,110,.3);color:var(--red)}
  </style>
</head>
<body>
<nav><a class="nav-logo" href="/index.html">SEATSNIPER</a></nav>
<div class="card">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Verifying...</h1>
  <p id="message">Please wait while we verify your email.</p>
  <div id="alertBox"></div>
  <a href="/index.html" class="btn" id="loginBtn" style="display:none">GO TO LOGIN</a>
</div>
<script>
  const token = new URLSearchParams(window.location.search).get("token");

  async function verify() {
    if (!token) {
      document.getElementById("icon").textContent = "❌";
      document.getElementById("title").textContent = "Invalid Link";
      document.getElementById("message").textContent = "This verification link is invalid.";
      return;
    }
    try {
      const res = await fetch(`/api/auth/verify-email?token=${token}`);
      const data = await res.json();
      if (res.ok) {
        document.getElementById("icon").textContent = "✅";
        document.getElementById("title").textContent = "Email Verified!";
        document.getElementById("message").textContent = "Your email has been verified. You can now log in to SeatSniper.";
        document.getElementById("loginBtn").style.display = "inline-block";
      } else {
        document.getElementById("icon").textContent = "❌";
        document.getElementById("title").textContent = "Verification Failed";
        document.getElementById("message").textContent = data.error || "This link is invalid or has expired.";
        document.getElementById("loginBtn").style.display = "inline-block";
      }
    } catch(e) {
      document.getElementById("icon").textContent = "❌";
      document.getElementById("title").textContent = "Something went wrong";
      document.getElementById("message").textContent = "Please try again or contact support.";
    }
  }

  verify();
</script>
</body>
</html>
